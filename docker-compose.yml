services:
  postgres:
    image: postgres:16-alpine
    container_name: horalix_postgres
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-horalix}"
      POSTGRES_USER: "${POSTGRES_USER:-horalix}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-horalix_dev}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-horalix} -d ${POSTGRES_DB:-horalix}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  orthanc:
    image: jodogne/orthanc-plugins
    container_name: orthanc
    ports:
      - "8042:8042"     # HTTP (Orthanc + DICOMweb)
      - "4242:4242"     # DICOM protocol
    volumes:
      - ./orthanc/orthanc.json:/etc/orthanc/orthanc.json:ro
      - orthanc_data:/var/lib/orthanc/db
    restart: unless-stopped

volumes:
  postgres_data:
  orthanc_data:
